---
- name: Set check mode from variable
  ansible.builtin.set_fact:
    ansible_check_mode: "{{ baseline_check_mode | default(false) | bool }}"
  tags:
    - always

- name: Set baseline facts
  ansible.builtin.set_fact:
    panorama_provider: "{{ provider }}"
    dg: "{{ device_group }}"
    ts: "{{ template_stack }}"

- name: Configure baseline security profile group
  paloaltonetworks.panos.panos_security_profile_group:
    provider: "{{ panorama_provider }}"
    device_group: "{{ dg }}"
    name: "{{ baseline_security_profile_group.name }}"
    virus: "{{ baseline_security_profile_group.virus }}"
    spyware: "{{ baseline_security_profile_group.spyware }}"
    vulnerability: "{{ baseline_security_profile_group.vulnerability }}"
    url_filtering: "{{ baseline_security_profile_group.url_filtering }}"
    file_blocking: "{{ baseline_security_profile_group.file_blocking }}"
    wildfire_analysis: "{{ baseline_security_profile_group.wildfire }}"
    state: present
  tags:
    - security_profiles

- name: Configure baseline security rules
  paloaltonetworks.panos.panos_security_rule:
    provider: "{{ panorama_provider }}"
    device_group: "{{ dg }}"
    rule_name: "{{ item.name }}"
    source_zone: "{{ item.source_zone }}"
    destination_zone: "{{ item.destination_zone }}"
    source_ip: "{{ item.source_address }}"
    destination_ip: "{{ item.destination_address }}"
    application: "{{ item.application }}"
    service: "{{ item.service }}"
    action: "{{ item.action }}"
    group_profile: "{{ item.profile_group | default(omit) }}"
    log_start: "{{ item.log_start | default(false) }}"
    log_end: "{{ item.log_end | default(true) }}"
    description: "{{ item.description | default('') }}"
    state: present
  loop: "{{ baseline_security_rules | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: baseline_security_rules is defined
  tags:
    - security_rules

- name: Configure baseline zone protection profile
  paloaltonetworks.panos.panos_zone_protection_profile:
    provider: "{{ panorama_provider }}"
    device_group: "{{ dg }}"
    name: "{{ baseline_zone_protection.name }}"
    flood_tcp_syn: "{{ baseline_zone_protection.settings.flood_tcp_syn }}"
    flood_udp: "{{ baseline_zone_protection.settings.flood_udp }}"
    flood_icmpv4: "{{ baseline_zone_protection.settings.flood_icmpv4}}"
    enable_scan_protection: "{{ baseline_zone_protection.settings.scan_protection }}"
    state: present
  tags:
    - zone_protection

- name: Configure NTP servers
  paloaltonetworks.panos.panos_mgtconfig:
    provider: "{{ panorama_provider }}"
    template: "{{ ts }}"
    ntp_server_primary: "{{ baseline_ntp.primary_server }}"
    ntp_server_secondary: "{{ baseline_ntp.secondary_server }}"
  tags:
    - ntp
    - management

- name: Configure DNS servers
  paloaltonetworks.panos.panos_mgtconfig:
    provider: "{{ panorama_provider }}"
    template: "{{ ts }}"
    dns_server_primary: "{{ baseline_dns.primary_server }}"
    dns_server_secondary: "{{ baseline_dns.secondary_server }}"
  tags:
    - dns
    - management

- name: Configure admin idle timeout
  paloaltonetworks.panos.panos_mgtconfig:
    provider: "{{ panorama_provider }}"
    template: "{{ ts }}"
    admin_lockout_time: "{{ baseline_management.idle_timeout }}"
  tags:
    - management

- name: Configure session timeouts
  paloaltonetworks.panos.panos_mgtconfig:
    provider: "{{ panorama_provider }}"
    template: "{{ ts }}"
    timeout_tcp: "{{ baseline_session.tcp_timeout }}"
    timeout_udp: "{{ baseline_session.udp_timeout }}"
  when: baseline_session is defined
  tags:
    - session
    - management

# Note: panos_password_complexity may not exist in all collection versions.
# If unavailable, use panos_config_element with the appropriate XML xpath.
- name: Configure password complexity profile
  paloaltonetworks.panos.panos_password_complexity:
    provider: "{{ panorama_provider }}"
    template: "{{ ts }}"
    enabled: "{{ baseline_password_policy.enabled }}"
    minimum_length: "{{ baseline_password_policy.minimum_length }}"
    minimum_uppercase_letters: 1
    minimum_lowercase_letters: 1
    minimum_numeric_letters: 1
    minimum_special_characters: 1
    password_history_count: "{{ baseline_password_policy.password_history }}"
    new_password_differs_by_characters: 3
  when: baseline_password_policy is defined
  tags:
    - password_policy
    - management

# Note: panos_log_forwarding_profile may not exist in all collection versions.
# If unavailable, use panos_config_element with the appropriate XML xpath.
- name: Configure log forwarding profile
  paloaltonetworks.panos.panos_log_forwarding_profile:
    provider: "{{ panorama_provider }}"
    device_group: "{{ dg }}"
    name: "{{ baseline_logging.log_forwarding_profile }}"
    state: present
  when: baseline_logging is defined
  tags:
    - logging

# Note: panos_dns_security_profile may not exist in all collection versions.
# If unavailable, use panos_config_element with the appropriate XML xpath.
- name: Configure DNS security profile
  paloaltonetworks.panos.panos_dns_security_profile:
    provider: "{{ panorama_provider }}"
    device_group: "{{ dg }}"
    name: "{{ baseline_dns_security.profile }}"
    state: present
  when: baseline_dns_security is defined and baseline_dns_security.enabled
  tags:
    - dns_security
    - security_profiles

# Note: panos_dynamic_updates may not exist in all collection versions.
# If unavailable, use panos_config_element with the appropriate XML xpath.
- name: Configure threat prevention dynamic updates
  paloaltonetworks.panos.panos_dynamic_updates:
    provider: "{{ panorama_provider }}"
    template: "{{ ts }}"
    type: "threats"
    action: "{{ baseline_updates.threat_prevention_updates }}"
    schedule: "{{ baseline_updates.update_schedule }}"
    time: "{{ baseline_updates.update_time }}"
  when: baseline_updates is defined
  tags:
    - updates
    - management

- name: Retrieve device groups for validation
  paloaltonetworks.panos.panos_op:
    provider: "{{ panorama_provider }}"
    cmd: "show devicegroups"
  register: devicegroups_output
  tags:
    - validation
    - always

- name: Display summary
  ansible.builtin.debug:
    msg: "Baseline config applied to {{ dg }} (template: {{ ts }})"
  tags:
    - always
